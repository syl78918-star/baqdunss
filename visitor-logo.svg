<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C5A059;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F0D080;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C5A059;stop-opacity:1" />
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="5" dy="5" result="offsetblur" />
      <feFlood flood-color="rgba(0,0,0,0.3)" />
      <feComposite in2="offsetblur" operator="in" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Clean White Background -->
  <rect width="512" height="512" fill="white"/>

  <!-- Crescent Moon -->
  <path d="M256 50 
           A210 210 0 1 0 256 462 
           A160 160 0 1 1 256 50 Z" 
        fill="#041E42" 
        stroke="url(#goldGradient)" 
        stroke-width="12" 
        filter="url(#dropShadow)"/>

  <!-- Gold Parsley (Baqduns) Leaf -->
  <g transform="translate(280, 256) scale(1.4)" filter="url(#dropShadow)">
    <path d="M0 -60 
             Q15 -40 30 -60 Q45 -80 30 -100 Q15 -80 0 -60 
             Q-15 -80 -30 -100 Q-45 -80 -30 -60 Q-15 -40 0 -60 Z" 
          fill="url(#goldGradient)" 
          stroke="#8A6D3B" 
          stroke-width="1"/>
    
    <!-- Central Leaf Lobes -->
    <path d="M0 -50 
             C20 -60 40 -40 30 -10 
             C40 10 20 40 0 30 
             C-20 40 -40 10 -30 -10 
             C-40 -40 -20 -60 0 -50 Z" 
          fill="url(#goldGradient)"/>
    
    <!-- Left Lobe -->
    <path d="M-15 -10 
             C-40 -30 -60 0 -45 20 
             C-60 40 -30 60 -15 40 
             C0 60 30 40 15 20 
             C30 0 10 -30 -15 -10 Z" 
          fill="url(#goldGradient)" 
          transform="rotate(30, -15, -10)"/>

    <!-- Right Lobe -->
    <path d="M15 -10 
             C40 -30 60 0 45 20 
             C60 40 30 60 15 40 
             C0 60 -30 40 -15 20 
             C-30 0 -10 -30 15 -10 Z" 
          fill="url(#goldGradient)" 
          transform="rotate(-30, 15, -10)"/>
    
    <!-- Stem Hook -->
    <path d="M0 40 Q0 70 15 85" 
          fill="none" 
          stroke="url(#goldGradient)" 
          stroke-width="8" 
          stroke-linecap="round"/>
  </g>
</svg>
