<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بقدونس - لوحة الإدارة ⚡</title>
    <link rel="manifest" href="/admin/manifest.json">
    <meta name="theme-color" content="#C5A059">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Baqduns Admin">
    <!-- Apple Touch Icon (أيقونة الأدمن للـ iPhone) -->
    <link rel="apple-touch-icon" href="/admin-icon.svg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #041E42;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Cairo', sans-serif;
            color: white;
        }

        .loader-wrap {
            text-align: center;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .admin-icon {
            width: 90px;
            height: 90px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px rgba(197, 160, 89, 0.5));
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        .title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #C5A059;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 30px;
        }

        .progress-bar {
            width: 200px;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            margin: 0 auto;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #C5A059, #F0D080);
            border-radius: 2px;
            animation: loading 1.2s ease-in-out forwards;
        }

        @keyframes loading {
            0% {
                width: 0%;
            }

            70% {
                width: 80%;
            }

            100% {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="loader-wrap">
        <img src="/admin-icon.svg" class="admin-icon" alt="Admin">
        <div class="title">لوحة الإدارة ⚡</div>
        <div class="subtitle">جاري تحميل نظام بقدونس...</div>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
    </div>

    <script>
        // ============================================================
        // ⚡ ADMIN PWA ENTRY POINT
        // 1. Register the Admin-specific Service Worker
        // 2. Handle ?tab= shortcuts from manifest shortcuts
        // 3. Redirect to the actual admin panel
        // ============================================================

        (function () {
            // Register Admin SW (scope: /admin/)
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/admin/sw.js', { scope: '/admin/' })
                    .then(reg => console.log('⚡ Admin SW registered:', reg.scope))
                    .catch(err => console.warn('Admin SW error:', err));
            }

            // Read tab shortcut from URL
            var params = new URLSearchParams(window.location.search);
            var tab = params.get('tab') || '';

            // Redirect to admin panel (with optional tab param)
            var dest = '../baqduns_optimizer.html';
            if (tab) dest += '?tab=' + encodeURIComponent(tab);

            // Wait for loading animation, then redirect
            setTimeout(function () {
                window.location.replace(dest);
            }, 1200);
        })();
    </script>
</body>

</html>
