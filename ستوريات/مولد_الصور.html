        * {

            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.3);
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
        }

        .btn-download-all {
            background: var(--color-green);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s;
        }

        .btn-download-all:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 30px;
        }

        .story-item {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s;
        }

        .story-item:hover {
            transform: translateY(-10px);
        }

        .story-canvas {
            width: 100%;
            height: auto;
            display: block;
            cursor: pointer;
        }

        .story-info {
            padding: 20px;
        }

        .story-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--color-navy);
            margin-bottom: 10px;
        }

        .story-description {
            font-size: 0.95rem;
            color: #555;
            line-height: 1.8;
            margin-bottom: 15px;
            padding: 15px;
            background: linear-gradient(135deg, #f9f9f9 0%, #fff 100%);
            border-right: 4px solid var(--color-gold);
            border-radius: 8px;
        }

        .story-example {
            font-size: 0.9rem;
            color: #666;
            background: #fff8e1;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            border-left: 3px solid var(--color-gold);
        }

        .btn-download {
            background: var(--color-gold);
            color: var(--color-navy);
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .btn-download:hover {
            filter: brightness(1.1);
            transform: scale(1.02);

        function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
            const words = text.split(' ');
            let line = '';
            let currentY = y;

            for (let n = 0; n < words.length; n++) {
                const testLine = line + words[n] + ' ';
                const metrics = ctx.measureText(testLine);
                const testWidth = metrics.width;

                if (testWidth > maxWidth && n > 0) {
                    ctx.fillText(line, x, currentY);
                    line = words[n] + ' ';
                    currentY += lineHeight;
                } else {
                    line = testLine;
                }
            }
            ctx.fillText(line, x, currentY);
            return currentY;
        }

        function drawIllustration(ctx, type) {
            ctx.save();

            if (type === 'transfer_seeds') {
                // Draw two people shaking hands
                // Person 1 (left)
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(350, 950, 60, 0, Math.PI * 2); // head
                ctx.fill();
                ctx.fillRect(320, 1010, 60, 120); // body
                ctx.fillRect(280, 1040, 40, 15); // left arm
                ctx.fillRect(380, 1040, 40, 15); // right arm pointing to handshake

                // Person 2 (right)
                ctx.fillStyle = '#87CEEB';
                ctx.beginPath();
                ctx.arc(730, 950, 60, 0, Math.PI * 2); // head
                ctx.fill();
                ctx.fillRect(700, 1010, 60, 120); // body
                ctx.fillRect(660, 1040, 40, 15); // left arm pointing to handshake
                ctx.fillRect(760, 1040, 40, 15); // right arm

                // Handshake in middle
                ctx.fillStyle = '#FFA500';
                ctx.fillRect(510, 1030, 60, 40);

                // Seeds/money transfer arrow
                ctx.strokeStyle = '#C5A059';
                ctx.lineWidth = 8;
                ctx.beginPath();
                ctx.moveTo(420, 1000);
                ctx.lineTo(540, 1000);
                ctx.stroke();
                // Arrow head
                ctx.beginPath();
                ctx.moveTo(540, 1000);
                ctx.lineTo(520, 985);
                ctx.lineTo(520, 1015);
                ctx.closePath();
                ctx.fillStyle = '#C5A059';
                ctx.fill();

            } else if (type === 'ai_protection') {
                // Draw shield with AI brain
                ctx.fillStyle = '#4A90E2';
                ctx.beginPath();
                ctx.moveTo(540, 900);
                ctx.lineTo(340, 950);
                ctx.lineTo(340, 1150);
                ctx.lineTo(540, 1250);
                ctx.lineTo(740, 1150);
                ctx.lineTo(740, 950);
                ctx.closePath();
                ctx.fill();

                // Brain inside
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(540, 1080, 80, 0, Math.PI * 2);
                ctx.fill();

                // Neural connections
                ctx.strokeStyle = '#FFF';
                ctx.lineWidth = 3;
                for (let i = 0; i < 8; i++) {
                    const angle = (Math.PI * 2 / 8) * i;
                    ctx.beginPath();
                    ctx.moveTo(540, 1080);
                    ctx.lineTo(540 + Math.cos(angle) * 60, 1080 + Math.sin(angle) * 60);
                    ctx.stroke();
                }

            } else if (type === 'auctions') {
                // Draw auction hammer
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(480, 950, 40, 200); // handle
                ctx.fillStyle = '#C5A059';
                ctx.fillRect(420, 920, 160, 60); // hammer head

                // Price tags going up
                const prices = ['10', '50', '100', '500'];
                prices.forEach((price, i) => {
                    ctx.fillStyle = i === 3 ? '#FFD700' : '#FFF';
                    ctx.fillRect(600 + i * 70, 1100 - i * 40, 60, 40);
                    ctx.fillStyle = '#000';
                    ctx.font = 'bold 24px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(price, 630 + i * 70, 1130 - i * 40);
                });

            } else if (type === 'buy_seeds') {
                // Draw seed bag with coins
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(420, 1000, 240, 200);
                ctx.fillStyle = '#654321';
                ctx.beginPath();
                ctx.moveTo(420, 1000);
                ctx.lineTo(540, 900);
                ctx.lineTo(660, 1000);
                ctx.fill();

                // Seeds/coins
                for (let i = 0; i < 6; i++) {
                    ctx.fillStyle = '#FFD700';
                    ctx.beginPath();
                    ctx.arc(460 + (i % 3) * 60, 1050 + Math.floor(i / 3) * 60, 25, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            ctx.restore();
        }

        function createCanvas(story) {
            const canvas = document.createElement('canvas');
            canvas.width = 1080;
            canvas.height = 1920;
            const ctx = canvas.getContext('2d');

            // Background gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, 1920);

            if (story.type === 'ramadan_welcome') {
                gradient.addColorStop(0, '#041E42');
                gradient.addColorStop(1, '#0a2e5c');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, 1080, 1920);

                // Decorative stars
                ctx.fillStyle = 'rgba(197, 160, 89, 0.3)';
                for (let i = 0; i < 80; i++) {
                    const x = Math.random() * 1080;
                    const y = Math.random() * 1920;
                    const size = Math.random() * 4 + 1;
                    ctx.beginPath();
                    ctx.arc(x, y, size, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Moon
                ctx.font = 'bold 200px Arial';
                ctx.textAlign = 'center';
                ctx.fillStyle = '#C5A059';
                ctx.fillText('🌙', 540, 380);

                // Title
                ctx.font = 'bold 90px Cairo, Arial';
                ctx.fillStyle = '#C5A059';
                ctx.fillText('أهلاً بكم في', 540, 580);
                ctx.font = 'bold 110px Cairo, Arial';
                ctx.fillText('متجر بقدونس', 540, 720);

                // Subtitle
                ctx.font = '50px Cairo, Arial';
                ctx.fillStyle = 'rgba(255,255,255,0.9)';
                ctx.fillText('بوابتك لنمو حساباتك 🌿', 540, 850);

                // Ramadan greeting
                ctx.font = 'bold 65px Cairo, Arial';
                ctx.fillStyle = 'white';
                ctx.fillText('رمضان كريم ✨', 540, 1100);

                // Description box
                ctx.fillStyle = 'rgba(197, 160, 89, 0.2)';
                ctx.fillRect(100, 1250, 880, 300);
                ctx.strokeStyle = '#C5A059';
                ctx.lineWidth = 3;
                ctx.strokeRect(100, 1250, 880, 300);

                // Description text
                ctx.font = '32px Cairo, Arial';
                ctx.fillStyle = 'white';
                wrapText(ctx, story.description, 540, 1320, 800, 45);

                // Example
                ctx.font = 'bold 36px Cairo, Arial';
                ctx.fillStyle = '#FFD700';
                wrapText(ctx, story.example, 540, 1480, 800, 50);

                // Store name
                ctx.font = 'bold 60px Cairo, Arial';
                ctx.fillStyle = '#C5A059';
                ctx.fillText('متجر بقدونس 🌿', 540, 1800);

            } else if (story.type.includes('_followers') || story.type.includes('_likes') || story.type.includes('_views') || story.type.includes('_subs')) {
                // Platform packages
                const platform = story.type.split('_')[0];
                let bgColor1, bgColor2, emoji, platformName;

                switch (platform) {
                    case 'ig': bgColor1 = '#f093fb'; bgColor2 = '#f5576c'; emoji = '📸'; platformName = 'Instagram'; break;
                    case 'fb': bgColor1 = '#4267B2'; bgColor2 = '#1877F2'; emoji = '👥'; platformName = 'Facebook'; break;
                    case 'tt': bgColor1 = '#000000'; bgColor2 = '#333333'; emoji = '🎵'; platformName = 'TikTok'; break;
                    case 'yt': bgColor1 = '#FF0000'; bgColor2 = '#CC0000'; emoji = '▶️'; platformName = 'YouTube'; break;
                    case 'tw': bgColor1 = '#1DA1F2'; bgColor2 = '#0c85d0'; emoji = '🐦'; platformName = 'Twitter'; break;
                }

                const packageGradient = ctx.createLinearGradient(0, 0, 0, 1920);
                packageGradient.addColorStop(0, bgColor1);
                packageGradient.addColorStop(1, bgColor2);
                ctx.fillStyle = packageGradient;
                ctx.fillRect(0, 0, 1080, 1920);

                // Platform icon
                ctx.font = 'bold 220px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(emoji, 540, 420);

                // Platform name
                ctx.font = 'bold 90px Cairo, Arial';
                ctx.fillStyle = 'white';
                ctx.fillText(platformName, 540, 620);

                // Service type
                const serviceType = story.type.includes('followers') ? 'متابعين' :
                    story.type.includes('likes') ? 'لايكات' :
                        story.type.includes('views') ? 'مشاهدات' : 'مشتركين';
                ctx.font = 'bold 110px Cairo, Arial';
                ctx.fillText(serviceType, 540, 780);

                // Features
                ctx.font = '55px Cairo, Arial';
                ctx.fillStyle = 'rgba(255,255,255,0.95)';
                ctx.fillText('🚀 توصيل فوري', 540, 1000);
                ctx.fillText('✅ جودة مضمونة 100%', 540, 1100);
                ctx.fillText('💎 أسعار منافسة', 540, 1200);

                // Description box
                ctx.fillStyle = 'rgba(255,255,255,0.15)';
                ctx.fillRect(80, 1300, 920, 350);

                // Description
                ctx.font = '36px Cairo, Arial';
                ctx.fillStyle = 'white';
                wrapText(ctx, story.description, 540, 1370, 840, 52);

                // Example
                ctx.font = 'bold 38px Cairo, Arial';
                ctx.fillStyle = '#FFD700';
                wrapText(ctx, story.example, 540, 1570, 840, 55);

                // Store name
                ctx.font = 'bold 60px Cairo, Arial';
                ctx.fillStyle = 'white';
                ctx.fillText('متجر بقدونس 🌿', 540, 1820);

            } else {
                // Other features
                gradient.addColorStop(0, '#1E3D2F');
                gradient.addColorStop(1, '#0a1f17');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, 1080, 1920);

                // Icon
                let emoji = '🌿';
                if (story.type === 'buy_seeds') emoji = '🌱💰';
                if (story.type === 'transfer_seeds') emoji = '💸🤝';
                if (story.type === 'auctions') emoji = '🔨⚡';
                if (story.type === 'ai_protection') emoji = '🧠🛡️';
                if (story.type === 'complaints') emoji = '📢💬';
                if (story.type === 'free_seeds') emoji = '🎁🌱';
                if (story.type === 'referral') emoji = '🤝💰';
                if (story.type === 'loyalty') emoji = '⭐🎖️';
                if (story.type === 'cart') emoji = '🛒✨';
                if (story.type === 'register') emoji = '📝✅';
                if (story.type === 'login') emoji = '🔐🚪';
                if (story.type === 'promo_code') emoji = '🎟️💸';
                if (story.type === 'redeem_points') emoji = '💎🔄';
                if (story.type === 'my_orders') emoji = '📦✅';
                if (story.type === 'payment_cliq') emoji = '💳⚡';
                if (story.type === 'payment_zain') emoji = '📱💰';
                if (story.type === 'order_confirm') emoji = '✅🎉';
                if (story.type.includes('package_')) emoji = '📦🌟';
                if (story.type === 'my_referral') emoji = '🔗💰';
                if (story.type === 'how_to_use') emoji = '📚📖';
                if (story.type === 'faq') emoji = '❓💡';

                ctx.font = 'bold 200px Arial';
                ctx.textAlign = 'center';
                ctx.fillStyle = '#C5A059';
                ctx.fillText(emoji, 540, 420);

                // Title
                ctx.font = 'bold 85px Cairo, Arial';
                ctx.fillStyle = 'white';
                wrapText(ctx, story.title, 540, 650, 900, 100);

                // Draw illustration for specific types
                if (['transfer_seeds', 'ai_protection', 'auctions', 'buy_seeds'].includes(story.type)) {
                    drawIllustration(ctx, story.type);
                }

                // Description box
                ctx.fillStyle = 'rgba(197, 160, 89, 0.15)';
                ctx.fillRect(80, 1300, 920, 450);
                ctx.strokeStyle = '#C5A059';
                ctx.lineWidth = 4;
                ctx.strokeRect(80, 1300, 920, 450);

                // Description
                ctx.font = '35px Cairo, Arial';
                ctx.fillStyle = 'rgba(255,255,255,0.95)';
                wrapText(ctx, story.description, 540, 1370, 840, 50);

                // Example
                ctx.font = 'bold 37px Cairo, Arial';
                ctx.fillStyle = '#FFD700';
                wrapText(ctx, story.example, 540, 1620, 840, 54);

                // Store name
                ctx.font = 'bold 60px Cairo, Arial';
                ctx.fillStyle = '#C5A059';
                ctx.fillText('متجر بقدونس 🌿', 540, 1830);
            }

            return canvas;
        }

        function renderGallery() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';

            stories.forEach(story => {
                const canvas = createCanvas(story);

                const item = document.createElement('div');
                item.className = 'story-item';
                item.innerHTML = `
                    <canvas class="story-canvas" id="canvas-${story.id}"></canvas>
                    <div class="story-info">
                        <div class="story-title">${story.id}. ${story.title}</div>
                        <div class="story-description">${story.description}</div>
                        <div class="story-example"><strong>💡 مثال:</strong> ${story.example}</div>
                        <button class="btn-download" onclick="downloadSingle(${story.id})">
                            💾 حفظ الصورة JPG
                        </button>
                    </div>
                `;

                gallery.appendChild(item);

                const displayCanvas = document.getElementById(`canvas-${story.id}`);
                displayCanvas.width = 1080;
                displayCanvas.height = 1920;
                displayCanvas.getContext('2d').drawImage(canvas, 0, 0);
            });
        }

        function downloadSingle(id) {
            const story = stories.find(s => s.id === id);
            const canvas = document.getElementById(`canvas-${id}`);

            canvas.toBlob(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `story_${String(id).padStart(2, '0')}_${story.type}.jpg`;
                a.click();
                URL.revokeObjectURL(url);
            }, 'image/jpeg', 0.95);
        }

        async function downloadAll() {
            const zip = new JSZip();
            const folder = zip.folder('baqdouns_stories');

            for (let story of stories) {
                const canvas = document.getElementById(`canvas-${story.id}`);
                const blob = await new Promise(resolve => {
                    canvas.toBlob(resolve, 'image/jpeg', 0.95);
                });
                folder.file(`story_${String(story.id).padStart(2, '0')}_${story.type}.jpg`, blob);
            }

            const content = await zip.generateAsync({ type: 'blob' });
            const url = URL.createObjectURL(content);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'baqdouns_stories_all.zip';
            a.click();
            URL.revokeObjectURL(url);
        }

        function regenerateAll() {
            renderGallery();
        }

        renderGallery();
    </script>
