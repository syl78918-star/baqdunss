        .visual-side {

            background: radial-gradient(circle at center, #1e293b, #0f172a);
            display: flex;
            justify-content: center;
            align-items: center;

        /* High-Res Animated Mesh Gradient */
        .mesh-gradient {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(46, 204, 113, 0.15), transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(39, 174, 96, 0.2), transparent 40%),
                radial-gradient(circle at 20% 80%, rgba(241, 196, 15, 0.1), transparent 40%);
            animation: meshMove 20s infinite alternate ease-in-out;
            filter: blur(60px);
            z-index: 1;
        }

        @keyframes meshMove {
            0% {
                transform: rotate(0deg) translate(0, 0);
            }

            100% {
                transform: rotate(10deg) translate(-5%, -5%);
            }
        }

        /* 3D Abstract Object (CSS Only) */
        .floating-object {
            position: relative;
            z-index: 2;
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.01));
            /* backdrop-filter: blur(20px); REMOVED */
            /* -webkit-backdrop-filter: blur(20px); REMOVED */
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            transform: rotate(-15deg) skewX(5deg);
            box-shadow: 20px 20px 60px rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            animation: floatObj 8s ease-in-out infinite;
        }

        .floating-object::after {
            content: '';
            position: absolute;
            top: 20%;
            left: 20%;
            width: 60%;
            height: 60%;
            background: linear-gradient(135deg, rgba(46, 204, 113, 0.4), rgba(39, 174, 96, 0.1));
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            /* filter: blur(30px); REMOVED */
            animation: morphBlob 8s ease-in-out infinite;
            display: block;
            z-index: 0;
        }

        .floating-object::before {
            content: '';
            /* Removed the leaf icon to avoid duplicate logos */
            display: none;
        }

        @keyframes morphBlob {
            0% {
                border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            }

            50% {
                border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            }

            100% {
                border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            }
        }

        @keyframes floatObj {

            0%,
            100% {
                transform: rotate(-15deg) skewX(5deg) translateY(0);
            }

            50% {
                transform: rotate(-12deg) skewX(2deg) translateY(-20px);
            }
        }

        @keyframes pulseIcon {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.9;
            }

            50% {
                transform: scale(1.05);
                opacity: 1;
            }
        }

        .loading-bar {

        .loading-bar::after {

            top: 0;

            background: var(--primary);

            0% {

    <script>
        // Auth Logic
        function decodeJwtResponse(token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function (c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        // =====================================================================
        // 🔒 DEVICE FINGERPRINT v2 (Cross-Browser + VPN-Resistant)
        // Same logic as script.js — duplicated here for login-page independence
        // =====================================================================
        function _webglFP() {
            try {
                const c = document.createElement('canvas');
                const gl = c.getContext('webgl') || c.getContext('experimental-webgl');
                if (!gl) return 'nowebgl';
                return ((gl.getParameter(gl.VENDOR) || '') + '|' + (gl.getParameter(gl.RENDERER) || '')).slice(0, 80);
            } catch (e) { return 'webglerr'; }
        }
        function _canvasFP() {
            try {
                const c = document.createElement('canvas');
                c.width = 200; c.height = 50;
                const ctx = c.getContext('2d');
                ctx.textBaseline = 'alphabetic';
                ctx.fillStyle = '#f60'; ctx.fillRect(10, 1, 62, 20);
                ctx.fillStyle = '#069'; ctx.font = '15px Arial';
                ctx.fillText('baqduns🌿', 2, 15);
                ctx.fillStyle = 'rgba(102,204,0,0.7)'; ctx.font = '15px sans-serif';
                ctx.fillText('baqduns🌿', 4, 17);
                return c.toDataURL().slice(-60);
            } catch (e) { return 'nocanvas'; }
        }
        function _audioFP() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100 });
                const osc = ctx.createOscillator();
                const analyser = ctx.createAnalyser();
                const gain = ctx.createGain();
                gain.gain.value = 0;
                osc.connect(analyser); analyser.connect(gain); gain.connect(ctx.destination);
                osc.start(0);
                const data = new Float32Array(analyser.frequencyBinCount);
                analyser.getFloatFrequencyData(data);
                osc.stop(); ctx.close();
                return data.slice(0, 5).join(',');
            } catch (e) { return 'noaudio'; }
        }
        function _fnvHash(str) {
            let h = 0x811c9dc5 >>> 0;
            for (let i = 0; i < str.length; i++) {
                h ^= str.charCodeAt(i);
                h = Math.imul(h, 0x01000193) >>> 0;
            }
            return 'DFP-' + h.toString(16).toUpperCase().padStart(8, '0');
        }
        function getDeviceFingerprint() {
            // Device-level signals ONLY — no user-agent (browser-agnostic)
            const raw = [
                screen.width, screen.height, screen.colorDepth,
                screen.pixelDepth || screen.colorDepth,
                new Date().getTimezoneOffset(),
                (Intl.DateTimeFormat().resolvedOptions().timeZone || ''),
                navigator.platform || '',
                navigator.language || '',
                navigator.hardwareConcurrency || 0,
                navigator.deviceMemory || 0,
                _webglFP(), _canvasFP(), _audioFP()
            ].join('||');
            const fp = _fnvHash(raw);
            localStorage.setItem('baqdouns_fp', fp);
            return fp;
        }

        function registerFingerprintLogin(email, users) {
            const fp = getDeviceFingerprint();
            const emailLower = email.toLowerCase();

            // Layer 1: Local registry
            const registry = JSON.parse(localStorage.getItem('baqdouns_fp_registry') || '{}');
            if (!registry[fp]) {
                registry[fp] = { email: emailLower, registeredAt: Date.now() };
            }
            const registryEmail = registry[fp].email;
            registry[fp].lastSeen = Date.now();
            localStorage.setItem('baqdouns_fp_registry', JSON.stringify(registry));
            localStorage.setItem('baqdouns_fp_email', emailLower);

            // Layer 2: Cross-reference ALL users' stored fingerprints (cross-browser!)
            const conflictUser = users.find(u =>
                u.deviceFingerprint && u.deviceFingerprint === fp &&
                u.email.toLowerCase() !== emailLower
            );
            if (conflictUser) {
                _logAbuse(fp, conflictUser.email, email, 'cross-user-db');
                return { isMultiAccount: true, originalEmail: conflictUser.email };
            }

            // Layer 3: Registry mismatch
            if (registryEmail !== emailLower) {
                _logAbuse(fp, registryEmail, email, 'registry-mismatch');
                return { isMultiAccount: true, originalEmail: registryEmail };
            }

            // ✅ Clean — bind fingerprint to this user record
            return { isMultiAccount: false, originalEmail: email, fp };
        }

        function _logAbuse(fp, originalEmail, newEmail, source) {
            const logs = JSON.parse(localStorage.getItem('baqdouns_abuse_logs') || '[]');
            logs.push({ date: new Date().toISOString(), fp, originalEmail, newEmail, source });
            if (logs.length > 100) logs.splice(0, logs.length - 100);
            localStorage.setItem('baqdouns_abuse_logs', JSON.stringify(logs));
        }

        // =====================================================================
        // 🎁 REFERRAL CODE HELPERS
        // =====================================================================
        function saveReferralCode() {
            const input = document.getElementById('referral-code-input');
            const msg = document.getElementById('referral-msg');
            if (!input) return;
            const code = input.value.trim().toUpperCase();
            if (!code) { showRefMsg('أدخل الكود أولاً', '#e74c3c'); return; }

            const users = JSON.parse(localStorage.getItem('baqdouns_users') || '[]');
            const referrer = users.find(u => u.referralCode === code);
            if (!referrer) {
                showRefMsg('❌ كود غير صحيح أو غير موجود', '#e74c3c');
                return;
            }
            // Valid
            localStorage.setItem('baqdouns_pending_referral', code);
            showRefMsg(`✅ كود ${referrer.name} محفوظ! ستحصل كلاكما على 100 بذرة 🌿`, '#2ecc71');
        }

        function showRefMsg(text, color) {
            const msg = document.getElementById('referral-msg');
            if (!msg) return;
            msg.textContent = text;
            msg.style.color = color;
            msg.style.display = 'block';
        }

        // Auto-fill referral from URL ?ref=BAQXXXXXX
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const refParam = params.get('ref');
            if (refParam) {
                const inp = document.getElementById('referral-code-input');
                if (inp) { inp.value = refParam.toUpperCase(); saveReferralCode(); }
            }
        });

        // =====================================================================
        // Google Sign-In Handler
        // =====================================================================
        function handleCredentialResponse(response) {
            try {
                const responsePayload = decodeJwtResponse(response.credential);

                const email = responsePayload.email;
                const name = responsePayload.name;
                const picture = responsePayload.picture;
                const sub = responsePayload.sub;

                let users = JSON.parse(localStorage.getItem('baqdouns_users') || '[]');
                let user = users.find(u => u.email === email);

                const isNewUser = !user;

                // ============================================================
                // 🎁 REFERRAL: apply pending referral code for NEW users only
                // ============================================================
                let referralApplied = false;
                let referrerName = '';
                if (isNewUser) {
                    const pendingCode = localStorage.getItem('baqdouns_pending_referral') || '';
                    if (pendingCode) {
                        const referrer = users.find(u => u.referralCode === pendingCode && u.email !== email);
                        if (referrer) {
                            const rIdx = users.findIndex(u => u.referralCode === pendingCode);
                            if (rIdx > -1) {
                                users[rIdx].points = (users[rIdx].points || 0) + 100; // Referrer earns 100
                                referralApplied = true;
                                referrerName = users[rIdx].name;
                            }
                        }
                    }
                    localStorage.removeItem('baqdouns_pending_referral');
                }

                // ============================================================
                // 🌿 WELCOME SEEDS: respect admin freeze + device duplicate check
                // ============================================================
                const fp = getDeviceFingerprint();
                const welcomeFrozen = localStorage.getItem('baqdouns_freeze_welcome') === 'true';
                const fpConflict = users.find(u => u.deviceFingerprint && u.deviceFingerprint === fp && u.email !== email);
                const welcomeSeeds = (isNewUser && !welcomeFrozen && !fpConflict) ? 100 : (isNewUser ? 0 : undefined);

                if (!user) {
                    user = {
                        id: 'USR-' + Date.now(),
                        googleId: sub, name, email,
                        password: null,
                        points: welcomeSeeds !== undefined ? welcomeSeeds : 0,
                        referralCode: 'BAQ' + Math.floor(100000 + Math.random() * 900000),
                        joined: new Date().toLocaleDateString(),
                        profilePic: picture, isVerified: true,
                        isBanned: false, banReason: "",
                        isMultiAccount: !!fpConflict,
                        multiAccountOriginal: fpConflict ? fpConflict.email : null
                    };
                    users.push(user);
                } else {
                    user.profilePic = picture;
                    user.name = name;
                    user.googleId = sub;
                }

                // 🔒 Register fingerprint + detect multi-account (3-layer check)
                const fpResult = registerFingerprintLogin(email, users);
                const uidx = users.findIndex(u => u.email === email);

                if (fpResult.isMultiAccount) {
                    if (uidx > -1) {
                        users[uidx].isMultiAccount = true;
                        users[uidx].multiAccountOriginal = fpResult.originalEmail;
                        user = users[uidx];
                    }
                    setTimeout(() => {
                        alert(`⚠️ تنبيه: هذا الجهاز مرتبط بحساب آخر!\n\nالحساب الأصلي: ${fpResult.originalEmail}\n\n🚫 البذور واللعبة والتحويل محظورة على هذا الجهاز.\nلا يفيد تغيير المتصفح أو استخدام VPN.`);
                    }, 800);
                } else {
                    if (uidx > -1 && !users[uidx].deviceFingerprint) {
                        users[uidx].deviceFingerprint = fpResult.fp || fp;
                        user = users[uidx];
                    }
                }

                localStorage.setItem('baqdouns_users', JSON.stringify(users));
                localStorage.setItem('baqdouns_current_user', JSON.stringify(user));

                // 🔥 FIREBASE AUTH: Official Sign-in for Amazon-level security
                if (window.BaqdDB) {
                    BaqdDB.onReady(async () => {
                        try {
                            // 1. Try official Firebase Auth
                            try {
                                await BaqdDB.authWithGoogle(response.credential);
                                console.log("🛡️ Firebase Auth Success!");
                            } catch (authErr) {
                                console.warn("🛡️ Auth Error (Proceeding in Hybrid Mode):", authErr.message);
                            }

                            // 2. Prepare user data & logs
                            const ua = navigator.userAgent || '';
                            const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(ua);
                            const loginEntry = {
                                id: 'LGN-' + Date.now(),
                                timestamp: Date.now(),
                                date: new Date().toLocaleString('ar-JO', { hour12: true }),
                                email: user.email,
                                name: user.name || 'Unknown',
                                method: 'Google',
                                deviceFp: localStorage.getItem('baqdouns_fp') || '—',
                                deviceType: isMobile ? '📱 موبايل' : '💻 كمبيوتر',
                                platform: navigator.platform || '—',
                                isMultiAccount: fpResult.isMultiAccount || false,
                                isRead: false
                            };

                            // 3. PERSIST DATA (This makes them appear for Admin)
                            try {
                                await BaqdDB.addLoginLog(loginEntry);
                                await BaqdDB.saveUser(user);
                                await BaqdDB.setPresence(user.email, true);
                            } catch (dbErr) {
                                console.warn("Could not sync to cloud yet:", dbErr.message);
                            }

                            // 4. Migrate and Complete
                            BaqdDB.onReady(() => {
                                BaqdDB.migrate();
                                window.location.href = 'index.html';
                            });
                        } catch (fatal) {
                            console.error("Fatal login process error:", fatal);
                            window.location.href = 'index.html';
                        }
                    });
                } else {
                    window.location.href = 'index.html';
                }

            } catch (error) {
                console.error("Auth Error", error);
                alert("Login Error. Please try again.");
            }
        }
    </script>

    <script>
        // =====================================================
        // 📲 PWA INSTALL LOGIC — Full cross-platform support
        // =====================================================
        var _pwaPrompt = null; // Stores the deferred install prompt

        // Listen for Chrome/Android install prompt
        window.addEventListener('beforeinstallprompt', function (e) {
            e.preventDefault();
            _pwaPrompt = e;
            console.log('✅ PWA Install prompt ready');
        });

        // Listen for successful install
        window.addEventListener('appinstalled', function () {
            _pwaPrompt = null;
            var btn = document.getElementById('pwa-install-btn-login');
            var txt = document.getElementById('pwa-btn-text');
            if (txt) txt.textContent = 'تم التنزيل بنجاح ✅';
            if (btn) {
                btn.style.borderColor = 'rgba(255,255,255,0.2)';
                btn.style.color = 'rgba(255,255,255,0.5)';
                btn.style.cursor = 'default';
                btn.onclick = null;
            }
        });

        function triggerPWAInstall() {
            var isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent) && !window.MSStream;
            var isInStandaloneMode = window.matchMedia('(display-mode: standalone)').matches
                || window.navigator.standalone === true;

            // Already installed?
            if (isInStandaloneMode) {
                var txt = document.getElementById('pwa-btn-text');
                if (txt) txt.textContent = 'التطبيق مثبّت بالفعل ✅';
                return;
            }

            // iOS Safari — show manual instructions
            if (isIOS) {
                var hint = document.getElementById('ios-install-hint');
                if (hint) {
                    hint.style.display = hint.style.display === 'none' ? 'block' : 'none';
                }
                return;
            }

            // Chrome/Android/Desktop — use native prompt
            if (_pwaPrompt) {
                _pwaPrompt.prompt();
                _pwaPrompt.userChoice.then(function (result) {
                    if (result.outcome === 'accepted') {
                        var txt = document.getElementById('pwa-btn-text');
                        if (txt) txt.textContent = 'جاري التنزيل... ⏳';
                    }
                    _pwaPrompt = null;
                });
            } else {
                // Fallback: guide user
                alert('لتنزيل التطبيق:\n\n🟢 Chrome: اضغط ⋮ (القائمة) ← "إضافة إلى الشاشة الرئيسية"\n🍎 Safari (iPhone): اضغط ⬆️ ← "إضافة إلى الشاشة الرئيسية"');
            }
        }
    </script>
