<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لا يوجد اتصال — Baqduns Admin</title>
    <meta name="theme-color" content="#041E42">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', sans-serif;
            background: #041E42;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }

        .icon {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-12px);
            }
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 800;
            color: #C5A059;
            margin-bottom: 10px;
        }

        p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
            margin-bottom: 30px;
            line-height: 1.7;
        }

        .btn-retry {
            background: linear-gradient(135deg, #C5A059, #d4b06a);
            color: #041E42;
            border: none;
            border-radius: 14px;
            padding: 15px 35px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-retry:active {
            transform: scale(0.96);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #e74c3c;
            display: inline-block;
            margin-left: 6px;
            animation: blink 1s ease-in-out infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.2;
            }
        }

        .checking {
            color: #C5A059;
            font-size: 0.85rem;
            margin-top: 16px;
        }
    </style>
</head>

<body>
    <div class="icon">📡</div>
    <h1>لا يوجد اتصال بالإنترنت <span class="status-dot"></span></h1>
    <p>
        لوحة أدمن بقدونس تحتاج إلى اتصال بالإنترنت<br>
        للعمل والوصول إلى البيانات الحية.
    </p>
    <button class="btn-retry" onclick="retryConnection()">
        🔄 إعادة المحاولة
    </button>
    <p class="checking" id="checking-msg"></p>

    <script>
        // Auto-retry every 5 seconds
        let retryCount = 0;

        async function retryConnection() {
            const msg = document.getElementById('checking-msg');
            msg.textContent = '⏳ جاري التحقق من الاتصال...';

            try {
                const controller = new AbortController();
                const timer = setTimeout(() => controller.abort(), 4000);
                await fetch('https://baqduns-edd79-default-rtdb.firebaseio.com/.json?shallow=true', {
                    signal: controller.signal,
                    cache: 'no-cache'
                });
                clearTimeout(timer);
                // Connected!
                msg.textContent = '✅ تم الاتصال! جاري التوجيه...';
                setTimeout(() => {
                    window.location.href = './baqduns_optimizer.html';
                }, 800);
            } catch (e) {
                retryCount++;
                msg.textContent = `❌ لا يزال لا يوجد اتصال (محاولة ${retryCount})`;
            }
        }

        // Auto check every 8 seconds
        setInterval(retryConnection, 8000);

        // Monitor online event
        window.addEventListener('online', () => {
            document.getElementById('checking-msg').textContent = '✅ عاد الاتصال! جاري التوجيه...';
            setTimeout(() => window.location.href = './baqduns_optimizer.html', 500);
        });
    </script>
</body>

</html>
