<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بقدونس | بوابة المدير الآمنة 🔒</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <style>
        :root {
            --color-navy: #041E42;
            --color-gold: #C5A059;
            --bg-gradient: linear-gradient(135deg, #041E42 0%, #1a3a6b 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 40px 20px;
        }

        .portal-container {
            text-align: center;
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .logo-container {
            margin-bottom: 40px;
        }

        .logo-svg {
            width: 100px;
            height: 100px;
            filter: drop-shadow(0 0 15px rgba(197, 160, 89, 0.5));
            margin-bottom: 15px;
        }

        .logo-text {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--color-gold);
            letter-spacing: 1px;
        }

        .options-grid {
            display: grid;
            gap: 20px;
        }

        .option-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(197, 160, 89, 0.3);
            padding: 25px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .option-card:hover {
            background: rgba(197, 160, 89, 0.15);
            border-color: var(--color-gold);
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
        }

        .option-card ion-icon {
            font-size: 3rem;
            color: var(--color-gold);
            margin-bottom: 12px;
        }

        .option-card h2 {
            font-size: 1.2rem;
            margin-bottom: 6px;
        }

        .option-card p {
            font-size: 0.85rem;
            color: #ccc;
        }

        .badge {
            margin-top: 10px;
            background: var(--color-gold);
            color: var(--color-navy);
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="portal-container">
        <div class="logo-container">
            <svg class="logo-svg" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="48" fill="none" stroke="#C5A059" stroke-width="4" />
                <path d="M50 20 C60 35 70 50 50 80 C30 50 40 35 50 20" fill="#C5A059" />
            </svg>
            <div class="logo-text">BAQDUNS ADMIN</div>
            <p style="color: #aaa; margin-top: 5px; font-size: 0.9rem;">نظام الإدارة والتحسين الشامل ⚡</p>
        </div>

        <div class="options-grid">
            <a href="javascript:void(0)" onclick="triggerAdminInstall()" class="option-card">
                <ion-icon name="apps-outline"></ion-icon>
                <h2>تنزيل تطبيق الإدارة</h2>
                <p>تثبيت "Optimizer" كأداة على جهازك</p>
                <div class="badge">SECURE PWA</div>
            </a>

            <a href="baqduns_optimizer.html" class="option-card">
                <ion-icon name="speedometer-outline"></ion-icon>
                <h2>الدخول للموقع</h2>
                <p>فتح لوحة التحكم عبر المتصفح</p>
            </a>
        </div>

        <button onclick="forceUpdateAdmin()"
            style="margin-top: 25px; background: none; border: 1px solid rgba(197, 160, 89, 0.3); color: #C5A059; padding: 10px 20px; border-radius: 25px; font-size: 0.8rem; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; margin-left: auto; margin-right: auto;">
            <ion-icon name="rocket-outline"></ion-icon>
            تحديث فوري للنظام
        </button>
    </div>

    <script>
        async function forceUpdateAdmin() {
            if (confirm('هل تريد تحديث تطبيق الأدمن؟')) {
                if ('serviceWorker' in navigator) {
                    const regs = await navigator.serviceWorker.getRegistrations();
                    for (let reg of regs) await reg.unregister();
                }
                if ('caches' in window) {
                    const keys = await caches.keys();
                    for (let key of keys) await caches.delete(key);
                }
                location.reload(true);
            }
        }
    </script>

    <p style="margin-top: 40px; font-size: 0.75rem; color: #555;">&copy; 2026 Baqduns Security. Authorized Access
        Only.</p>
    </div>

    <script>
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });

        function triggerAdminInstall() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    deferredPrompt = null;
                });
            } else {
                window.location.href = 'baqduns_optimizer.html?install=1';
            }
        }
    </script>
</body>

</html>
