<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <!-- Auth Guard: redirect to login if not logged in -->
    <script>
        (function() {
            try {
                var u = localStorage.getItem('baqdouns_current_user');
                if (!u || u === 'null') { window.location.replace('login.html'); }
            } catch(e) {}
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شكاويي - Baqduns</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="instagram_3d.png">

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <style>
        :root {
            --color-navy: #041E42;
            --color-green: #1E3D2F;
            --color-gold: #C5A059;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--color-navy) 0%, var(--color-green) 100%);
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            margin: 0;
            color: var(--color-navy);
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--color-navy) 0%, var(--color-green) 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(4, 30, 66, 0.3);
        }

        .btn-secondary {
            background: white;
            color: var(--color-navy);
            border: 2px solid var(--color-navy);
        }

        .btn-secondary:hover {
            background: var(--color-navy);
            color: white;
        }

        .complaints-grid {
            display: grid;
            gap: 20px;
        }

        .complaint-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
        }

        .complaint-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .complaint-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .complaint-id {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--color-navy);
        }

        .complaint-date {
            color: #666;
            font-size: 0.9rem;
        }

        .status-badge {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            display: inline-block;
        }

        .status-new {
            background: #fee;
            color: #e74c3c;
        }

        .status-processing {
            background: #fff3cd;
            color: #f39c12;
        }

        .status-resolved {
            background: #d4edda;
            color: #27ae60;
        }

        .complaint-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .info-label {
            font-size: 0.85rem;
            color: #666;
            font-weight: 600;
        }

        .info-value {
            font-size: 1rem;
            color: var(--color-navy);
        }

        .complaint-message {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-right: 4px solid var(--color-gold);
            margin-top: 15px;
        }

        .complaint-message-label {
            font-weight: 600;
            color: var(--color-navy);
            margin-bottom: 8px;
        }

        .complaint-message-text {
            color: #333;
            line-height: 1.6;
        }

        .admin-reply {
            background: #f0f7ff;
            padding: 15px;
            border-radius: 8px;
            border-right: 4px solid #3498db;
            margin-top: 15px;
        }

        .admin-reply-label {
            font-weight: 600;
            color: #2980b9;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .empty-state {
            background: white;
            border-radius: 12px;
            padding: 60px 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .empty-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .empty-state h2 {
            color: var(--color-navy);
            margin-bottom: 10px;
        }

        .empty-state p {
            color: #666;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .header h1 {
                font-size: 1.4rem;
            }

            .complaint-info {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3380778876722304"
        crossorigin="anonymous"></script>

</head>

<body>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <!-- Google AdSense: Inside Complaints -->
            <div style="margin-bottom: 20px; text-align: center;">
                <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-3380778876722304"
                    data-ad-slot="9256911321" data-ad-format="auto" data-full-width-responsive="true"></ins>
                <script>
                    (adsbygoogle = window.adsbygoogle || []).push({});
                </script>
            </div>
            <h1>
                <span>📢</span>
                شكاويي
            </h1>
            <div style="display: flex; gap: 10px;">
                <a href="index.html" class="btn btn-secondary">
                    <ion-icon name="home-outline"></ion-icon>
                    الرئيسية
                </a>
                <button onclick="logout()" class="btn btn-primary">
                    <ion-icon name="log-out-outline"></ion-icon>
                    تسجيل الخروج
                </button>
            </div>
        </div>

        <!-- Complaints List -->
        <div id="complaints-container" class="complaints-grid">
            <!-- Complaints will be loaded here -->
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="empty-state" style="display: none;">
            <div class="empty-icon">📢</div>
            <h2>لا توجد شكاوى</h2>
            <p>لم تقم بتقديم أي شكوى بعد</p>
            <a href="index.html" class="btn btn-primary">
                <ion-icon name="arrow-back-outline"></ion-icon>
                العودة للرئيسية
            </a>
        </div>
    </div>

    <script>
        // Check if user is logged in
        const currentUser = JSON.parse(localStorage.getItem('baqdouns_current_user') || 'null');

        if (!currentUser) {
            alert('يجب تسجيل الدخول أولاً!');
            window.location.href = 'index.html';
        }

        // Load user complaints
        function loadMyComplaints() {
            const allComplaints = JSON.parse(localStorage.getItem('baqdouns_complaints') || '[]');
            const myComplaints = allComplaints.filter(c => c.email === currentUser.email);

            const container = document.getElementById('complaints-container');
            const emptyState = document.getElementById('empty-state');

            if (myComplaints.length === 0) {
                container.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            container.style.display = 'grid';
            emptyState.style.display = 'none';

            container.innerHTML = myComplaints.map(complaint => {
                const statusClass = complaint.status === 'جديدة' ? 'status-new' :
                    complaint.status === 'قيد المعالجة' ? 'status-processing' : 'status-resolved';

                const statusIcon = complaint.status === 'جديدة' ? '🔴' :
                    complaint.status === 'قيد المعالجة' ? '🟡' : '🟢';

                return `
                    <div class="complaint-card">
                        <div class="complaint-header">
                            <div>
                                <div class="complaint-id">${complaint.id}</div>
                                <div class="complaint-date">${new Date(complaint.createdAt).toLocaleString('ar-JO', {
                    dateStyle: 'full',
                    timeStyle: 'short'
                })}</div>
                            </div>
                            <span class="status-badge ${statusClass}">
                                ${statusIcon} ${complaint.status}
                            </span>
                        </div>
                        
                        <div class="complaint-info">
                            <div class="info-item">
                                <div class="info-label">نوع الشكوى</div>
                                <div class="info-value">${complaint.typeText}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">رقم الطلب</div>
                                <div class="info-value">${complaint.orderId}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">البريد الإلكتروني</div>
                                <div class="info-value">${complaint.email}</div>
                            </div>
                        </div>
                        
                        <div class="complaint-message">
                            <div class="complaint-message-label">تفاصيل الشكوى:</div>
                            <div class="complaint-message-text">${complaint.message}</div>
                        </div>
                        
                        ${complaint.adminReply ? `
                        <div class="admin-reply">
                            <div class="admin-reply-label">
                                <ion-icon name="chatbox-ellipses"></ion-icon>
                                رد الإدارة:
                            </div>
                            <div class="complaint-message-text">${complaint.adminReply}</div>
                            <div style="font-size: 0.8rem; color: #7f8c8d; margin-top: 8px;">
                                تم الرد في: ${new Date(complaint.repliedAt).toLocaleString('ar-JO')}
                            </div>
                        </div>
                        ` : `
                        <div style="margin-top: 15px; font-size: 0.9rem; color: #7f8c8d; font-style: italic;">
                            ⏳ بانتظار رد الإدارة...
                        </div>
                        `}
                    </div>
                `;
            }).join('');
        }

        function logout() {
            localStorage.removeItem('baqdouns_current_user');
            window.location.href = 'index.html';
        }

        // Load complaints on page load
        loadMyComplaints();
    </script>
    <!-- Footer -->
    <footer>
        <div class="container footer-content">
            <div class="footer-logo">baqduns 🌿</div>
            <p style="color: black; font-weight: bold;">All Rights Reserved baqduns 2026 &copy;</p>

            <div class="footer-legal-links">
                <a href="privacy-policy.html">سياسة الخصوصية</a>
                <a href="terms-of-service.html">شروط الخدمة</a>
                <a href="about.html">من نحن</a>

            </div>
        </div>
    </footer>


</body>

</html>
